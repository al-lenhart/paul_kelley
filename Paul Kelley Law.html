  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

       <p style=\"font-size:19px;line-height:1.6;color:#444B3E;max-width:520px;margin-bottom:38px;margin-left:{{ heroPMargin }};margin-right:{{ heroPMargin }}\">Experienced, committed counsel and representation for carriers and self-insureds before the Texas Division of Workers' Compensation — from the first BRC to the courts of appeals.<\u002Fp>\n        <div style=\"display:flex;gap:16px;flex-wrap:wrap;justify-content:{{ heroJustify }}\">\n          <a href=\"#contact\" style=\"text-decoration:none;background:#16352A;color:#F4EEE2;padding:15px 30px;border-radius:2px;font-size:15px;font-weight:600;letter-spacing:0.2px\">Discuss a matter<\u002Fa>\n          <a href=\"#services\" style=\"text-decoration:none;border:1.5px solid rgba(22,53,42,0.35);color:#16352A;padding:15px 30px;border-radius:2px;font-size:15px;font-weight:600;letter-spacing:0.2px\">What we handle<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showPortrait }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"flex:0 0 380px;max-width:380px\">\n          <div style=\"position:relative\">\n            <div style=\"position:absolute;inset:18px -18px -18px 18px;background:#16352A;border-radius:2px\"><\u002Fdiv>\n            <image-slot id=\"paul-portrait\" src=\"426ba3ad-8f66-4174-a7c8-2d451778129a\" style=\"position:relative;display:block;width:380px;height:470px\" shape=\"rounded\" radius=\"2\" placeholder=\"Drop portrait of Paul Kelley\"><\u002Fimage-slot>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CREDENTIALS BAR ===== -->\n  <sc-if value=\"{{ showCredentials }}\" hint-placeholder-val=\"{{ true }}\">\n  <section style=\"background:#16352A;color:#E9E3D4\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:46px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:30px\">\n      <div style=\"border-left:2px solid {{ accent }};padding-left:18px\">\n        <div style=\"font-family:'Libre Caslon Text',serif;font-size:30px;line-height:1;margin-bottom:8px\">Board<br>Certified<\u002Fdiv>\n        <div style=\"font-size:13px;line-height:1.5;color:#B6C2B2\">Workers' Compensation Law, Texas Board of Legal Specialization — since 2004<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid {{ accent }};padding-left:18px\">\n        <div style=\"font-family:'Libre Caslon Text',serif;font-size:30px;line-height:1;margin-bottom:8px\">1996<\u002Fdiv>\n        <div style=\"font-size:13px;line-height:1.5;color:#B6C2B2\">Practicing since graduating from the University of Texas School of Law<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid {{ accent }};padding-left:18px\">\n        <div style=\"font-family:'Libre Caslon Text',serif;font-size:30px;line-height:1;margin-bottom:8px\">Carriers &amp;<br>Self-Insureds<\u002Fdiv>\n        <div style=\"font-size:13px;line-height:1.5;color:#B6C2B2\">Exclusive focus on the defense side of workers' compensation<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"border-left:2px solid {{ accent }};padding-left:18px\">\n        <div style=\"font-family:'Libre Caslon Text',serif;font-size:30px;line-height:1;margin-bottom:8px\">Zurich<\u002Fdiv>\n        <div style=\"font-size:13px;line-height:1.5;color:#B6C2B2\">Former exclusive counsel to Zurich American Insurance Co. on key matters<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <!-- ===== SERVICES ===== -->\n  <section id=\"services\" style=\"max-width:1200px;margin:0 auto;padding:96px 32px 30px\">\n    <div style=\"display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:24px;margin-bottom:54px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n          <span style=\"width:34px;height:1.5px;background:{{ accent }}\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:{{ accent }};font-weight:600\">What We Handle<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:44px;line-height:1.08;color:#16352A;letter-spacing:-0.3px;max-width:620px\">Representation and counsel across the full life of a comp claim.<\u002Fh2>\n      <\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.6;color:#5C6357;max-width:300px\">We handle the hearing, but also help you maintain the business behind it — policyholders, claims managers and home offices.<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:rgba(22,53,42,0.14);border:1px solid rgba(22,53,42,0.14)\">\n      <sc-for list=\"{{ services }}\" as=\"svc\" hint-placeholder-count=\"9\">\n        <div style=\"background:#FAF6EC;padding:32px 28px 36px;min-height:188px;display:flex;flex-direction:column\">\n          <span style=\"font-family:'Libre Caslon Text',serif;font-size:15px;color:{{ accent }};margin-bottom:20px\">{{ svc.num }}<\u002Fspan>\n          <h3 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:23px;line-height:1.15;color:#16352A;margin-bottom:12px\">{{ svc.title }}<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.55;color:#5C6357\">{{ svc.desc }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:28px;display:flex;align-items:flex-start;gap:14px;background:#EDE6D5;border-radius:2px;padding:22px 26px\">\n      <span style=\"font-family:'Libre Caslon Text',serif;font-size:22px;color:{{ accent }};line-height:1\">§<\u002Fspan>\n      <p style=\"font-size:14.5px;line-height:1.6;color:#444B3E\"><strong style=\"font-weight:600;color:#16352A\">Modern, transparent billing.<\u002Fstrong> We bill using UTBMS codes and guidelines — the current standard for defense litigation management nationwide — in LEDES-exportable format, and submit electronically through Allegient for clients using its litigation-management services.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== APPROACH ===== -->\n  <section id=\"approach\" style=\"background:#16352A;color:#E9E3D4;margin-top:96px\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:96px 32px\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n        <span style=\"width:34px;height:1.5px;background:{{ accent }}\"><\u002Fspan>\n        <span style=\"font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:{{ accent }};font-weight:600\">The Approach<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:44px;line-height:1.1;letter-spacing:-0.3px;max-width:720px;margin-bottom:18px\">A good plan is the blueprint of success.<\u002Fh2>\n      <p style=\"font-size:18px;line-height:1.6;color:#B6C2B2;max-width:640px;margin-bottom:64px\">The same five steps on every matter — whether it's three weeks of disability or a CCH as complex as a trial.<\u002Fp>\n      <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:36px\">\n        <sc-for list=\"{{ steps }}\" as=\"step\" hint-placeholder-count=\"5\">\n          <div>\n            <div style=\"font-family:'Libre Caslon Text',serif;font-size:15px;color:{{ accent }};margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid rgba(233,227,212,0.22)\">{{ step.num }}<\u002Fdiv>\n            <h3 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:26px;margin-bottom:10px\">{{ step.title }}<\u002Fh3>\n            <p style=\"font-size:13.5px;line-height:1.55;color:#9FAE9B\">{{ step.desc }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== ABOUT ===== -->\n  <section id=\"about\" style=\"max-width:1200px;margin:0 auto;padding:96px 32px\">\n    <div style=\"display:flex;gap:72px;align-items:flex-start;flex-wrap:wrap\">\n      <div style=\"flex:0 0 360px;max-width:360px\">\n        <div style=\"position:relative\">\n          <div style=\"position:absolute;inset:-16px 16px 16px -16px;border:1.5px solid {{ accent }};border-radius:2px\"><\u002Fdiv>\n          <image-slot id=\"paul-about\" src=\"161b2bbf-0da8-4a3c-8363-3653bb8cb3e9\" style=\"position:relative;display:block;width:360px;height:440px\" shape=\"rounded\" radius=\"2\" placeholder=\"Drop photo of Paul Kelley\"><\u002Fimage-slot>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 340px;min-width:0\">\n        <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:18px\">\n          <span style=\"width:34px;height:1.5px;background:{{ accent }}\"><\u002Fspan>\n          <span style=\"font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:{{ accent }};font-weight:600\">About the Firm<\u002Fspan>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:40px;line-height:1.1;color:#16352A;letter-spacing:-0.3px;margin-bottom:26px\">Paul L. Kelley<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.7;color:#3F4639;margin-bottom:18px\">Paul Kelley has represented carriers and self-insureds in the workers' compensation arena since 1996, when he graduated from the University of Texas School of Law. He has been board certified in workers' compensation law since 2004.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.7;color:#3F4639;margin-bottom:18px\">He started the firm after representing Zurich American Insurance Company exclusively for six years, earning the distinction of handling some of its most important workers' compensation cases. He continues that work today for a broader range of clients.<\u002Fp>\n        <p style=\"font-size:16px;line-height:1.7;color:#3F4639;margin-bottom:32px\">Legal services are not all the same — nor should they be, not even in workers' compensation. You need an attorney who won't back down, but also one who helps you satisfy policyholders, avoid administrative pitfalls, and explain your decisions to hearing officers, judges, employers and home offices alike.<\u002Fp>\n        <blockquote style=\"border-left:3px solid {{ accent }};padding:6px 0 6px 24px;font-family:'Libre Caslon Text',serif;font-style:italic;font-size:23px;line-height:1.4;color:#16352A\">Our mission is to provide efficient and exceptional service to our clients as representatives and counselors.<\u002Fblockquote>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===== CONTACT ===== -->\n  <section id=\"contact\" style=\"background:#11281F;color:#E9E3D4\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:92px 32px\">\n      <div style=\"display:flex;gap:80px;flex-wrap:wrap;justify-content:space-between\">\n        <div style=\"flex:1 1 360px;min-width:0\">\n          <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:20px\">\n            <span style=\"width:34px;height:1.5px;background:{{ accent }}\"><\u002Fspan>\n            <span style=\"font-size:12px;letter-spacing:3.5px;text-transform:uppercase;color:{{ accent }};font-weight:600\">Contact<\u002Fspan>\n          <\u002Fdiv>\n          <h2 style=\"font-family:'Libre Caslon Text',serif;font-weight:400;font-size:42px;line-height:1.08;letter-spacing:-0.3px;margin-bottom:30px\">Let's talk about<br>your matter.<\u002Fh2>\n          <p style=\"font-size:16px;line-height:1.65;color:#A9B7A4;max-width:420px;margin-bottom:40px\">Whether you need representation at a hearing or consultation on a complex, high-exposure matter, we'll prepare for and provide the level of service you require.<\u002Fp>\n\n          <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px 40px;max-width:480px\">\n            <div>\n              <div style=\"font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:{{ accent }};margin-bottom:10px\">Office<\u002Fdiv>\n              <div style=\"font-size:15px;line-height:1.6;color:#DCE3D6\">5701 W. Slaughter Ln.<br>Bldg. A-130 #510<br>Austin, TX 78749<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:{{ accent }};margin-bottom:10px\">Direct<\u002Fdiv>\n              <div style=\"font-size:15px;line-height:1.85;color:#DCE3D6\">P &nbsp;<a href=\"tel:5126919501\" style=\"text-decoration:none\">512.691.9501<\u002Fa><br>F &nbsp;800.691.8537<br><a href=\"mailto:paul@paulkelleylaw.com\" style=\"text-decoration:none\">paul@paulkelleylaw.com<\u002Fa><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:0 1 400px;min-width:300px;background:rgba(244,238,226,0.05);border:1px solid rgba(233,227,212,0.16);border-radius:2px;padding:32px\">\n          <div style=\"font-family:'Libre Caslon Text',serif;font-size:22px;color:#F4EEE2;margin-bottom:22px\">Send an inquiry<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <input id=\"pk-name\" type=\"text\" placeholder=\"Name\" style=\"background:transparent;border:none;border-bottom:1px solid rgba(233,227,212,0.3);color:#F4EEE2;font-size:15px;padding:10px 2px;outline:none\">\n            <input id=\"pk-email\" type=\"email\" placeholder=\"Email\" style=\"background:transparent;border:none;border-bottom:1px solid rgba(233,227,212,0.3);color:#F4EEE2;font-size:15px;padding:10px 2px;outline:none\">\n            <textarea id=\"pk-msg\" rows=\"3\" placeholder=\"How can we help?\" style=\"background:transparent;border:none;border-bottom:1px solid rgba(233,227,212,0.3);color:#F4EEE2;font-size:15px;padding:10px 2px;outline:none;resize:vertical\"><\u002Ftextarea>\n            <button onclick=\"{{ sendInquiry }}\" style=\"margin-top:8px;background:{{ accent }};color:#11281F;border:none;padding:14px;border-radius:2px;font-size:14px;font-weight:700;letter-spacing:0.3px;cursor:pointer;font-family:inherit\">Send inquiry<\u002Fbutton>\n          <\u002Fdiv>\n          <p style=\"font-size:11.5px;line-height:1.5;color:#7E8C7A;margin-top:16px\">This site is for general information and does not create an attorney-client relationship.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"border-top:1px solid rgba(233,227,212,0.14)\">\n      <div style=\"max-width:1200px;margin:0 auto;padding:26px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px\">\n        <span style=\"font-family:'Libre Caslon Text',serif;font-size:15px;color:#A9B7A4\">Paul Kelley Law, PLLC<\u002Fspan>\n        <span style=\"font-size:12.5px;color:#6F7D6B\">© 2026 Paul Kelley Law, PLLC. All rights reserved. · Austin, Texas<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script>\n(function(){\n  var map={'paul-portrait':'pkPortrait','paul-about':'pkAbout'};\n  function apply(){\n    if(!window.__resources) return false;\n    var done=true;\n    Object.keys(map).forEach(function(id){\n      var el=document.getElementById(id);\n      var url=window.__resources[map[id]];\n      if(el&&url){ if(el.getAttribute('src')!==url) el.setAttribute('src',url); }\n      else done=false;\n    });\n    return done;\n  }\n  var n=0;\n  var t=setInterval(function(){ if(apply()||n++>80) clearInterval(t); },100);\n  document.addEventListener('DOMContentLoaded',apply);\n})();\n<\u002Fscript>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1200,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Brass&quot;,&quot;Forest&quot;,&quot;Clay&quot;],&quot;default&quot;:&quot;Brass&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;heroLayout&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Portrait right&quot;,&quot;Centered&quot;],&quot;default&quot;:&quot;Portrait right&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showCredentials&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const accents = { Brass: '#A8884E', Forest: '#5C9173', Clay: '#B06A4A' };\n    const accent = accents[this.props.accent] || accents.Brass;\n    const layout = this.props.heroLayout || 'Portrait right';\n    const centered = layout === 'Centered';\n\n    const services = [\n      { num: '01', title: 'Hearings & Appeals', desc: 'Representation at BRCs, CCHs, administrative appeals, and judicial-review trials and appeals.' },\n      { num: '02', title: 'Case Consultation', desc: 'Counsel on any workers\\u2019 compensation matter, from routine disputes to high-exposure claims.' },\n      { num: '03', title: 'Medical Review', desc: 'Representation at the medical-review CCHs before the Division of Workers\\u2019 Compensation.' },\n      { num: '04', title: 'Subrogation', desc: 'Pursuing and recovering subrogation interests on behalf of carriers and self-insureds.' },\n      { num: '05', title: 'Subsequent Injury Fund', desc: 'Recovery of reimbursement from the Texas Subsequent Injury Fund.' },\n      { num: '06', title: 'Designated Doctor Analysis', desc: 'Analysis letters interpreting designated-doctor opinions and their impact on a claim.' },\n      { num: '07', title: 'General Liability Defense', desc: 'Defense representation extending beyond the comp system when matters cross over.' },\n      { num: '08', title: 'Continuing Education', desc: 'Continuing-education training for claims professionals on evolving comp practice.' },\n      { num: '09', title: 'Employer Seminars', desc: 'Education seminars helping employers understand and manage their comp exposure.' },\n    ];\n\n    const steps = [\n      { num: '01', title: 'Listen', desc: 'Start with the client and the facts of the claim.' },\n      { num: '02', title: 'Learn', desc: 'Take the time to analyze the real issues at stake.' },\n      { num: '03', title: 'Counsel', desc: 'Develop the best plan in concert with the claims professional.' },\n      { num: '04', title: 'Plan', desc: 'A good plan is the blueprint of a successful outcome.' },\n      { num: '05', title: 'Execute', desc: 'Carry it through \\u2014 from the BRC to the courts of appeals.' },\n    ];\n\n    const sendInquiry = () => {\n      const g = (id) => (document.getElementById(id) || {}).value || '';\n      const subject = encodeURIComponent('Website inquiry' + (g('pk-name') ? ' \\u2014 ' + g('pk-name') : ''));\n      const body = encodeURIComponent(g('pk-msg') + (g('pk-email') ? '\\n\\nReply to: ' + g('pk-email') : ''));\n      window.location.href = 'mailto:paul@paulkelleylaw.com?subject=' + subject + '&body=' + body;\n    };\n\n    return {\n      accent,\n      services,\n      steps,\n      sendInquiry,\n      showPortrait: !centered,\n      showCredentials: this.props.showCredentials !== false,\n      heroDir: centered ? 'column' : 'row',\n      heroAlign: centered ? 'center' : 'flex-start',\n      heroTextAlign: centered ? 'center' : 'left',\n      heroJustify: centered ? 'center' : 'flex-start',\n      heroPMargin: centered ? 'auto' : '0',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
